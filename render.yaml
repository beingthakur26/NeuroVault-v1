services:
  # --------------------------------------------------------------------------
  # 1. THE BACKEND (API)
  # --------------------------------------------------------------------------
  - type: web
    name: neurovault-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        production: production
      - key: MONGODB_URI
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # --------------------------------------------------------------------------
  # 2. THE FRONTEND (UI)
  # --------------------------------------------------------------------------
  - type: static
    name: neurovault-ui
    env: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_API_URL
        value: https://neurovault-api.onrender.com # Change this to your backend URL after deploy
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
